apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-mongodb
  labels:
    app: intellmeet-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intellmeet-mongodb
  template:
    metadata:
      labels:
        app: intellmeet-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          emptyDir: {} # For production, replace with PersistentVolumeClaim
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: intellmeet-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
