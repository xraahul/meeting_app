apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-server
  namespace: intellmeet
  labels:
    app: intellmeet-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intellmeet-server
  template:
    metadata:
      labels:
        app: intellmeet-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: intellmeet-server
          image: intellmeet-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: production
            - name: MONGO_URI
              value: mongodb://mongodb:27017/intellmeet
            - name: REDIS_URL
              value: redis://redis:6379
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: intellmeet-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: intellmeet-secrets
                  key: JWT_REFRESH_SECRET
            - name: CLIENT_URL
              value: "http://localhost:5173"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-server
  namespace: intellmeet
spec:
  type: ClusterIP
  selector:
    app: intellmeet-server
  ports:
    - port: 5000
      targetPort: 5000
