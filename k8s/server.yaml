apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-server
  labels:
    app: intellmeet-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intellmeet-server
  template:
    metadata:
      labels:
        app: intellmeet-server
    spec:
      containers:
        - name: intellmeet-server
          image: intellmeet-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/intellmeet"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              value: "intellmeet-k8s-secret-key"
            - name: CLIENT_URL
              value: "http://localhost:5173"
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-server
spec:
  type: ClusterIP
  selector:
    app: intellmeet-server
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
