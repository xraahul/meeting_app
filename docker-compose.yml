version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: intellmeet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: intellmeet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: intellmeet-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/intellmeet
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-intellmeet-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-intellmeet-dev-refresh-secret-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: intellmeet-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
