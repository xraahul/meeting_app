version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: intellmeet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: intellmeet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
    container_name: intellmeet-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/intellmeet
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=intellmeet-dev-secret-key-change-me
      - SENTRY_DSN=
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_SOCKET_URL=http://localhost:5000
    container_name: intellmeet-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongodb_data:
  redis_data:
