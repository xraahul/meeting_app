name: IntellMeet CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/intellmeet

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            frontend/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend TypeScript build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_SOCKET_URL: /

      - name: npm audit (server)
        working-directory: server
        run: npm audit --audit-level=high || true

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          tags: intellmeet-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: intellmeet-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_SOCKET_URL=/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration & Smoke Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose up -d --build
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Server healthy"
              break
            fi
            sleep 5
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke tests
        working-directory: server
        run: |
          npm ci
          SMOKE_BASE_URL=http://localhost:5000 node scripts/smoke-test.js

      - name: Tear down
        if: always()
        run: docker compose down -v

  security-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d --build
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173/ && break
            sleep 5
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:5173
          cmd_options: "-a -d -T 5"
          allow_issue_writing: false

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:latest
            ${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_SOCKET_URL=/

  deploy-render:
    name: Deploy to Render (optional)
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set — skipping deploy"
          fi
