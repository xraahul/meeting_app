# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect your GitHub repo

services:
  # ── Backend API (Node.js) ──────────────────────────────────────────────────
  - type: web
    name: intellmeet-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false               # You'll paste your MongoDB Atlas URI here
      - key: CLIENT_URL
        sync: false               # Set to your frontend URL after deploy
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false               # Optional: Redis Cloud free tier URL. App works without it.

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: intellmeet-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false               # Set to: https://intellmeet-api.onrender.com/api
      - key: VITE_SOCKET_URL
        sync: false               # Set to: https://intellmeet-api.onrender.com
