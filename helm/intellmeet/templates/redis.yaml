{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intellmeet.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "intellmeet.fullname" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "intellmeet.fullname" . }}-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intellmeet.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "intellmeet.fullname" . }}-redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
