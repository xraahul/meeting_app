apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intellmeet.fullname" . }}-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "intellmeet.labels" . | nindent 4 }}
    component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "intellmeet.fullname" . }}-server
  template:
    metadata:
      labels:
        app: {{ include "intellmeet.fullname" . }}-server
        component: server
      annotations:
        prometheus.io/scrape: "{{ .Values.monitoring.prometheusScrape }}"
        prometheus.io/port: "{{ .Values.server.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: server
          image: {{ .Values.server.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.server.port }}
          envFrom:
            - configMapRef:
                name: {{ include "intellmeet.fullname" . }}-config
            - secretRef:
                name: {{ include "intellmeet.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intellmeet.fullname" . }}-server
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "intellmeet.fullname" . }}-server
  ports:
    - port: {{ .Values.server.port }}
      targetPort: {{ .Values.server.port }}
