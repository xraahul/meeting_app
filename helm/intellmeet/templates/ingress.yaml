{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "intellmeet.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: {{ include "intellmeet.fullname" . }}-server
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "intellmeet.fullname" . }}-server
                port:
                  number: {{ .Values.server.port }}
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: {{ include "intellmeet.fullname" . }}-server
                port:
                  number: {{ .Values.server.port }}
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: {{ include "intellmeet.fullname" . }}-server
                port:
                  number: {{ .Values.server.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "intellmeet.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
